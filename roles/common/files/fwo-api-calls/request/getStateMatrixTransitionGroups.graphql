query getStateMatrixTransitionGroups {
  transition_groups: request_state_matrix_transition_group(order_by: {name: asc}) {
    id
    name
    description
    phase
    visibility_group_id
    exclusive
    workflow_visibility_group {
      id
      name
      description
    }
    state_matrix_phase_transition_groups(order_by: {phase_matrix_id: asc}) {
      phase_matrix_id
      sort_order
      state_matrix_phase {
        id
        name
        phase
      }
    }
    state_matrix_transitions(order_by: [{from_state_id: asc}, {sort_order: asc}]) {
      from_state_id
      to_state_id
      sort_order
    }
  }
}
