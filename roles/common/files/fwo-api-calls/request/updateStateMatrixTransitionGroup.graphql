mutation updateStateMatrixTransitionGroup(
  $id: Int!
  $name: String!
  $description: String
  $phase: String
  $visibilityGroupId: Int
  $exclusive: Boolean!
) {
  update_transition_group: update_request_state_matrix_transition_group_by_pk(
    pk_columns: {id: $id}
    _set: {
      name: $name
      description: $description
      phase: $phase
      visibility_group_id: $visibilityGroupId
      exclusive: $exclusive
    }
  ) {
    updatedId: id
  }
}
