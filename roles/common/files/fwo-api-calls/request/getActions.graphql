
query getActions {
  action_list: request_action (order_by: { id: asc }){
    id
    name
    action_type
    scope
    task_type
    phase
    event
    button_text
    external_parameters
    state_actions(order_by: { sort_order: asc, state_id: asc }) {
      sort_order
      state {
        id
        name
      }
    }
  }
}
