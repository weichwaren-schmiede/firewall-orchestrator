# client tools (ldapmodify, ldapdelete, ldapsearch) are needed in every installation mode,
# so they are installed separately from the server packages
openldap_client_pkgs:
  - openldap-clients

openldap_server_pkgs:
  - openldap-servers
  - openssl
  - python3-pyOpenSSL

openldap_server_app_path: "/etc/openldap"
openldap_server_user: ldap
openldap_schema_dir: "/etc/openldap/schema"
openldap_module_path: "/usr/lib64/openldap"
openldap_service_defaults_file: "/etc/sysconfig/slapd"
