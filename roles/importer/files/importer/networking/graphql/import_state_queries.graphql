query getActionMap {
    stm_action {
        action_name
        action_id
        allowed
    }
}

query getTrackMap {
    stm_track {
        track_name
        track_id
    }
}

query getLinkType {
    stm_link_type {
        id
        name
    }
}

query getColors {
    stm_color {
        color_id
        color_name
    }
}

query getNetworkObjTypeMap {
    stm_obj_typ {
        obj_typ_name
        obj_typ_id
    }
}

query getServiceObjTypeMap {
    stm_svc_typ {
        svc_typ_name
        svc_typ_id
    }
}

query getUserObjTypeMap {
    stm_usr_typ {
        usr_typ_name
        usr_typ_id
    }
}

query getIpProtocols {
    stm_ip_proto {
        ip_proto_id
        ip_proto_name
    }
}

query getGatewayMap {
    device {
        mgm_id
        dev_id
        dev_uid
    }
}

query getManagementMap($mgmId: Int!) {
    management(where: {mgm_id: {_eq: $mgmId}}) {
        mgm_id
        mgm_uid
        sub_managers: managementByMultiDeviceManagerId {
            mgm_id
            mgm_uid
        }
    }
}
